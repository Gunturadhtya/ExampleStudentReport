services:
  postgres:
    image: postgres:16-alpine
    container_name: student-report-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: student_report_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
    name: student-report-data