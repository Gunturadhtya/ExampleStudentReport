    parameters:
      - $ref: '#/components/parameters/PathId'
    patch:
      tags: [Reports]
      summary: Update report status (Admin only)
      description: |
        Changes report status and automatically creates a `ReportLog` entry.

        **Allowed transitions:**  
        `Pending → In_Progress → Completed`  
        `Pending → Rejected`  
        `In_Progress → Rejected`
      operationId: updateReportStatus
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
