<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Data - Student Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light" style="font-family: 'Inter', sans-serif;">

<div class="">
    <div th:replace=""></div>
    <div class="">
        <div th:replace=""></div>

        <main class="">
            <div class="mb-4">
                <h2 class="h4 fw-bold text-dark mb-1">Manajemen Master Data</h2>
                <p class="tet-secondary small mb-4">Kelola data referensi kategori kerusakan dan lokasi fasilitas kampus</p>
            </div>

            <div>
                <div>
                    <ul>
                        <li>
                            <button></button>
                        </li>
                        <li>
                            <button></button>
                        </li>
                    </ul>
                </div>

                <div>
                    <div>
                        <div class="tab-pane fade show active" id="category" role="tabpanel">
                            <div class="d-flex justify-content-between align-items-center p-4">
                                <h5 class="fw-bold mb-0 text-dark" style="font-size: 1.1rem;">Daftar Kategori</h5>
                                <button class="btn btn-sm px-3 py-2 fw-bold d-flex align-items-center gap-2 rounded-3 shadow-sm" style="background-color: #BDE0FE; color: #0F172A; border: 1px solid #A2D2FF;" data-bs-toggle="modal" data-bs-target="#modalAddCategory">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="12" y1="5" x2="12" y2="19"></line>
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                    </svg>
                                    Tambah Kategori
                                </button>
                            </div>
                            <div>
                                <table>
                                    <thead>
                                    <tr>
                                        <th scope="col" class="text-muted small fw-semibold text-uppercase px-4 py-3" style="width: 5%;">No</th>
                                        <th scope="col" class="text-muted small fw-semibold text-uppercase px-4 py-3" style="width: 25%;">Nama Kategori</th>
                                        <th scope="col" class="text-muted small fw-semibold text-uppercase px-4 py-3" style="width: 55%;">Deskripsi</th>
                                        <th scope="col" class="text-muted small fw-semibold text-uppercase px-4 py-3 text-end" style="width: 15%;">Aksi</th>
                                    </tr>
                                    </thead>
                                    <tbody class="border-top-0">
                                    <tr th:each="category, stat : ${categories ?: #numbers.sequence(1, 3)}">
                                        <td class="px-4 py-3 text-muted small fw-medium">1</td>
                                        <td class="px-4 py-3 fw-bold text-dark small fw-medium">Infrastruktur Kelas</td>
                                        <td class="px-4 py-3 text-muted small d-inline-block text-truncate">Kerusakan...</td>
                                        <td class="px-4 py-3 text-end">
                                            <button class="btn btn-sm btn-outline-danger p-1 border-0">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                                                    <polyline points="3 6 5 6 21 6"></polyline>
                                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                                </svg>
                                            </button>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div>
                            <div>
                                <h5>Daftar Ruangan</h5>
                                <button>
                                    <svg>
                                        <line x1="12" y1="5" x2="12" y2="19"></line>
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                    </svg>
                                    Tambah Ruangan
                                </button>
                            </div>
                            <div>
                                <table>
                                    <thead>
                                    <tr>
                                        <th scope="col" class="text-muted small fw-semibold text-uppercase px-4 py-3" style="width: 5%;">No</th>
                                        <th scope="col" class="text-muted small fw-semibold text-uppercase px-4 py-3" style="width: 30%;">Nama Gedung</th>
                                        <th scope="col" class="text-muted small fw-semibold text-uppercase px-4 py-3" style="width: 30%;">Nama Ruangan</th>
                                        <th scope="col" class="text-muted small fw-semibold text-uppercase px-4 py-3" style="width: 20%;">Lantai</th>
                                        <th scope="col" class="text-muted small fw-semibold text-uppercase px-4 py-3 text-end" style="width: 15%;">Aksi</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr>
                                        <td>1</td>
                                        <td>Gedung Fakultas Teknik Banjarmasin</td>
                                        <td>Ruang A-14</td>
                                        <td>Lantai 1</td>
                                        <td>
                                            <button>
                                                <svg>
                                                    <polyline points="3 6 5 6 21 6"></polyline>
                                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                                </svg>
                                            </button>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
